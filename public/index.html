<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <!-- App Identity -->
  <title>Sudoku</title>
  <meta name="description"
    content="Play classic 9x9 Sudoku puzzles with real-time validation, error highlighting, and infinite puzzle generation. Perfect for brain training!">
  <meta name="keywords" content="sudoku, puzzle, game, logic, numbers, brain training, 9x9">
  <meta name="author" content="Sudoku Game App">

  <!-- PWA Integration -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196f3">
  <meta name="msapplication-TileColor" content="#2196f3">

  <!-- Icons -->
  <link rel="icon" href="/sudoku-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/sudoku-icon.svg">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sudoku Puzzle Game">
  <meta property="og:description"
    content="Classic 9x9 Sudoku puzzles with real-time validation and infinite puzzle generation">
  <meta property="og:image" content="/sudoku-icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sudoku Puzzle Game">
  <meta name="twitter:description" content="Classic 9x9 Sudoku puzzles with real-time validation">
</head>

<body>
  <div class="header">
    <h1>sudoku</h1>
  </div>
  <noscript>
    <div
      style="text-align: center; padding: 20px; background: #ffebee; border: 1px solid #f44336; margin: 20px; border-radius: 4px;">
      <h2>JavaScript Required</h2>
      <p>This Sudoku game requires JavaScript to run. Please enable JavaScript in your browser and refresh the page.</p>
    </div>
  </noscript>
  <div id="root"></div>
</body>

</html>
